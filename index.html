<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" id="viewport-meta" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<meta name="theme-color" content="#4a3120">
<title>Thắng Pháp — Abhidhamma</title>
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-buddha3-192.png">
<link rel="icon" type="image/png" href="icon-buddha3-192.png">
<style>
  :root{
    --bg:#f7f3ec; --card:#ffffff; --ink:#2c2620; --ink-soft:#6b6053; --fontscale:1;
    --purple-50:#EEEDFE;--purple-200:#AFA9EC;--purple-800:#3C3489;
    --teal-50:#E1F5EE;--teal-200:#5DCAA5;--teal-800:#085041;
    --coral-50:#FAECE7;--coral-200:#F0997B;--coral-800:#712B13;
    --pink-50:#FBEAF0;--pink-200:#ED93B1;--pink-800:#72243E;
    --amber-50:#FAEEDA;--amber-200:#EF9F27;--amber-800:#633806;
    --blue-50:#E6F1FB;--blue-200:#85B7EB;--blue-800:#0C447C;
    --green-50:#EAF3DE;--green-200:#97C459;--green-800:#27500A;
    --gray-50:#F1EFE8;--gray-200:#B4B2A9;--gray-800:#444441;
  }
  @media (prefers-color-scheme: dark){
    :root{
      --bg:#1c1712; --card:#2a231c; --ink:#f0e9dd; --ink-soft:#a89e8f;
      --purple-50:#3C3489;--purple-200:#7F77DD;--purple-800:#CECBF6;
      --teal-50:#085041;--teal-200:#1D9E75;--teal-800:#9FE1CB;
      --coral-50:#712B13;--coral-200:#D85A30;--coral-800:#F5C4B3;
      --pink-50:#72243E;--pink-200:#D4537E;--pink-800:#F4C0D1;
      --amber-50:#633806;--amber-200:#BA7517;--amber-800:#FAC775;
      --blue-50:#0C447C;--blue-200:#378ADD;--blue-800:#B5D4F4;
      --green-50:#27500A;--green-200:#639922;--green-800:#C0DD97;
      --gray-50:#444441;--gray-200:#888780;--gray-800:#D3D1C7;
    }
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;padding:0;background:var(--bg);color:var(--ink);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;height:100%;overflow-x:hidden}
  #app{display:flex;flex-direction:column;height:100vh;height:100dvh}
  header{padding:14px 16px 10px;text-align:center;flex:none}
  header h1{font-size:17px;margin:0 0 2px;font-weight:700}
  header p{font-size:11.5px;color:var(--ink-soft);margin:0}
  main{flex:1;overflow-y:auto;padding:8px 10px 90px}
  .grid{display:grid;grid-template-columns:repeat(4,1fr);gap:7px;overflow-x:hidden}
  .card{border-radius:12px;padding:8px 4px;text-align:center;border:1px solid transparent;cursor:pointer;user-select:none;transition:transform .1s;min-width:0;overflow-wrap:break-word}
  .card:active{transform:scale(0.94)}
  .card .n{font-size:calc(11px * var(--fontscale));font-weight:700;opacity:.7}
  .card .v{font-size:calc(14px * var(--fontscale));font-weight:700;margin-top:2px;line-height:1.25}
  .card .p{font-size:calc(11px * var(--fontscale));font-style:italic;margin-top:2px;opacity:.85;line-height:1.15}
  .legend{display:flex;flex-wrap:wrap;gap:6px 14px;margin:14px 2px 4px;font-size:calc(12.5px * var(--fontscale));color:var(--ink-soft)}
  .legend-item{display:flex;align-items:center;gap:5px}
  .dot{width:11px;height:11px;border-radius:3px;flex:none}
  nav{flex:none;display:flex;border-top:1px solid rgba(128,128,128,.25);background:var(--card);padding-bottom:env(safe-area-inset-bottom)}
  nav button{flex:1;background:none;border:none;padding:9px 2px 8px;font-size:10.5px;color:var(--ink-soft);font-family:inherit;line-height:1.25}
  nav button.active{color:#c9762e;font-weight:700}
  nav button .ico{display:block;font-size:16px;margin-bottom:2px}
  .cat-purple{background:var(--purple-50);border-color:var(--purple-200);color:var(--purple-800)}
  .cat-teal{background:var(--teal-50);border-color:var(--teal-200);color:var(--teal-800)}
  .cat-coral{background:var(--coral-50);border-color:var(--coral-200);color:var(--coral-800)}
  .cat-pink{background:var(--pink-50);border-color:var(--pink-200);color:var(--pink-800)}
  .cat-amber{background:var(--amber-50);border-color:var(--amber-200);color:var(--amber-800)}
  .cat-blue{background:var(--blue-50);border-color:var(--blue-200);color:var(--blue-800)}
  .cat-green{background:var(--green-50);border-color:var(--green-200);color:var(--green-800)}
  .cat-gray{background:var(--gray-50);border-color:var(--gray-200);color:var(--gray-800)}

  #sheet-backdrop{position:fixed;inset:0;background:rgba(0,0,0,.45);opacity:0;pointer-events:none;transition:opacity .2s;z-index:10}
  #sheet-backdrop.show{opacity:1;pointer-events:auto}
  #sheet{position:fixed;left:0;right:0;bottom:0;background:var(--card);border-radius:18px 18px 0 0;
    max-height:82vh;overflow-y:auto;transform:translateY(100%);transition:transform .25s ease-out;z-index:11;
    padding:10px 20px calc(24px + env(safe-area-inset-bottom));}
  #sheet.show{transform:translateY(0)}
  .sheet-handle{width:38px;height:4px;background:rgba(128,128,128,.35);border-radius:2px;margin:2px auto 12px}
  .sheet-head{display:flex;align-items:baseline;gap:8px;margin-bottom:2px}
  .sheet-head .num{font-size:13px;color:var(--ink-soft);font-weight:700}
  .sheet-head h2{font-size:23px;margin:0;font-weight:700}
  .sheet-pali{font-size:16px;font-style:italic;color:var(--ink-soft);margin:0 0 14px}
  .sec{margin-bottom:14px}
  .sec-label{font-size:calc(19px * var(--fontscale));color:var(--ink);font-weight:800;margin-bottom:4px}
  .sec-body{font-size:calc(16.5px * var(--fontscale));line-height:1.6}
  .pill-row{display:flex;flex-wrap:wrap;gap:6px;margin-top:2px}
  .pill{font-size:11.5px;font-weight:700;padding:4px 10px;border-radius:20px}
  .close-x{position:absolute;top:12px;right:14px;font-size:20px;color:var(--ink-soft);background:none;border:none;padding:4px}

  #section-switch{display:flex;gap:6px;margin-top:10px;justify-content:space-between;align-items:center;flex-wrap:wrap}
  #section-switch button{font-size:11px;padding:6px 11px;border-radius:16px;border:1px solid rgba(128,128,128,.3);background:none;color:var(--ink-soft);font-family:inherit;font-weight:600}
  #section-switch button.active{background:#c9762e;color:#fff;border-color:#c9762e}
  .ddwrap{position:relative;display:inline-block}
  .ddbtn .caret{font-size:10px;opacity:.7;margin-left:2px}
  .ddmenu{display:none;position:absolute;top:calc(100% + 6px);left:0;z-index:120;background:var(--card);border:1px solid rgba(128,128,128,.35);border-radius:12px;box-shadow:0 10px 30px rgba(0,0,0,.22);min-width:210px;padding:6px;max-height:70vh;overflow-y:auto}
  .ddmenu.right{left:auto;right:0}
  .ddmenu.open{display:block}
  #section-switch .ddmenu .dditem, #fontctrl .ddmenu .dditem{display:block;width:100%;height:auto;text-align:left;padding:10px 12px;border:none;border-radius:8px;background:none;color:var(--ink);font-size:13.5px;font-weight:600;font-family:inherit;white-space:nowrap}
  #section-switch .ddmenu .dditem.on, #fontctrl .ddmenu .dditem.on{background:#c9762e;color:#fff}
  #section-switch .ddmenu .dditem:active, #fontctrl .ddmenu .dditem:active{background:rgba(201,118,46,.18)}
  #fontctrl .ddrow{display:flex;align-items:center;gap:6px;padding:8px 10px;font-size:13px;font-weight:600;color:var(--ink-soft);white-space:nowrap}
  #fontctrl .ddrow span.lbl{flex:1}
  #section-switch .ddbtn{background:linear-gradient(180deg,rgba(255,255,255,.65) 0%,rgba(255,255,255,.22) 18%,rgba(255,255,255,0) 45%),linear-gradient(180deg,#e09a4a 0%,#c9762e 50%,#9c5314 100%);color:#fff;border:1px solid #8a4a12;font-size:12.5px;padding:8px 15px;box-shadow:0 5px 10px rgba(110,58,10,.45),0 2px 0 rgba(255,255,255,.5) inset,0 -4px 7px rgba(70,35,5,.4) inset;text-shadow:0 1px 2px rgba(0,0,0,.4);transition:transform .08s,box-shadow .08s}
.ddbtn:active{transform:translateY(1.5px);box-shadow:0 1px 3px rgba(122,66,14,.35),0 1px 0 rgba(255,255,255,.25) inset,0 2px 5px rgba(0,0,0,.22) inset}
  #section-switch .cur-page{align-self:center;font-size:12px;color:var(--ink-soft);font-weight:600}

  .subnav{display:flex;gap:6px;margin:0 2px 10px;flex-wrap:wrap}
  .subnav button{flex:1;min-width:100px;font-size:11.5px;padding:7px 6px;border-radius:10px;border:1px solid rgba(128,128,128,.25);background:var(--card);color:var(--ink-soft);font-family:inherit;font-weight:600}
  .subnav button.active{border-color:#c9762e;color:#c9762e;background:rgba(201,118,46,.08)}

  .group-head{font-size:calc(18px * var(--fontscale));font-weight:800;color:var(--ink);margin:14px 2px 6px;letter-spacing:.02em}
  .group-head:first-child{margin-top:2px}

  .circle-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(calc(72px * var(--fontscale, 1)),1fr));gap:calc(8px * var(--fontscale, 1));margin-bottom:4px}
  .circle{aspect-ratio:1;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-direction:column;text-align:center;cursor:pointer;padding:9%;user-select:none;transition:transform .12s ease,box-shadow .12s ease,filter .12s;position:relative;overflow:hidden;contain:size;perspective:230px;
  --c:#d8c6a0;color:#2c2620;border:none;
  background:radial-gradient(circle at 32% 26%,var(--cl) 0%,var(--c) 46%,var(--cd) 78%,var(--cdd) 100%);
  --cl:#f6efdc;--cd:#b3a279;--cdd:#8f7f5c;
  box-shadow:0 12px 22px -6px rgba(40,26,6,.5),0 3px 6px rgba(40,26,6,.18)}
.circle::before{content:'';position:absolute;inset:0;border-radius:inherit;pointer-events:none;z-index:2;background:radial-gradient(ellipse 34% 22% at 30% 20%,rgba(255,255,255,.95) 0%,rgba(255,255,255,.35) 55%,rgba(255,255,255,0) 100%),radial-gradient(circle 5.5% at 66% 13%,rgba(255,255,255,.98) 0%,rgba(255,255,255,0) 100%),radial-gradient(ellipse 60% 22% at 50% 100%,rgba(255,255,255,.28) 0%,rgba(255,255,255,0) 70%)}
.circle::after{content:none}
.circle>*{position:relative;z-index:1}
  .circle:active,.circle.pressed{transform:translateY(3px) scale(.93);filter:brightness(.95) saturate(1.08);box-shadow:0 5px 10px -4px rgba(40,26,6,.45),0 1px 3px rgba(40,26,6,.16)}
.circle.pressed{box-shadow:0 5px 10px -4px rgba(40,26,6,.45),0 1px 3px rgba(40,26,6,.16),0 0 0 2.5px rgba(255,255,255,.55) inset}
  .circle .cn{font-size:min(calc(12px * var(--fontscale)), 15px);font-weight:700;line-height:1.2;overflow:hidden;max-width:92%;transform:translateZ(10px);text-shadow:0 1px 1px rgba(255,255,255,.28),0 -1px 1px rgba(0,0,0,.12)}
.circle>.cp:first-child{transform:rotateX(38deg);transform-origin:50% 130%}
.circle>.cp:last-child{transform:rotateX(-36deg);transform-origin:50% -30%}
  .circle .cp{font-size:min(calc(9.5px * var(--fontscale)), 12px);font-style:italic;opacity:.85;margin-top:1px;overflow:hidden;max-width:92%;text-shadow:0 1px 1px rgba(255,255,255,.22)}

  .combo-list{display:flex;flex-direction:column;gap:8px;margin-top:6px}
  .combo-item{display:flex;align-items:flex-start;gap:8px;padding:8px 10px;border-radius:10px;background:rgba(128,128,128,.07)}
  .combo-badge{flex:none;width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11.5px;font-weight:700}
  .combo-text{font-size:calc(16.5px * var(--fontscale));line-height:1.5}
  .combo-text .cname{font-weight:700}
  .combo-text .cpali{font-style:italic;color:var(--ink-soft);font-size:calc(14.5px * var(--fontscale))}

  .article h3{font-size:15px;margin:20px 0 6px}
  .article p{font-size:14px;line-height:1.6;margin:6px 0}
  .article .box4{border-radius:14px;padding:12px 14px;margin:10px 0}
  .info-note{font-size:12.5px;color:var(--ink-soft);background:rgba(128,128,128,.08);border-radius:10px;padding:8px 10px;margin-top:8px}

  .poster-block{margin-bottom:14px}
  .poster-label{font-size:11px;color:var(--ink-soft);margin-bottom:5px;font-weight:600}
  .dot-row{display:grid;gap:5px;margin-bottom:5px}
  .pdot{aspect-ratio:1;border-radius:50%;cursor:pointer;transition:transform .1s;border:1px solid rgba(0,0,0,.15)}
  .pdot:active{transform:scale(.85)}
  .v-kho{background:#232323}
  .v-lac{background:#eec22b}
  .v-uu{background:#7a3030}
  .v-hy{background:#d13b3b}
  .v-xa{background:#2f7d46}
  .d-gray{background:#9b9891}
  .d-amber{background:#e3941a}
  .d-coral{background:#d9663f}
  .d-pink{background:#d1548a}
  .d-teal{background:#1f9a76}
  .d-blue{background:#3f7fc9}
  .d-purple{background:#7d6fd0}
  .d-green{background:#5a9e2f}
  .poster-section-title{font-size:15px;font-weight:700;margin:18px 2px 8px}
  .big-count{display:flex;align-items:baseline;gap:8px;background:rgba(201,118,46,.1);border-radius:12px;padding:12px 16px;margin:10px 0 14px}
  .big-num{font-size:40px;font-weight:800;color:#c9762e;line-height:1}
  .big-unit{font-size:15.5px;color:var(--ink-soft)}

  .poster-cols{display:flex;gap:8px;align-items:flex-start;max-width:100%;overflow-x:auto}
  .poster-col{flex:1;min-width:0}
  .poster-col-title{font-size:12px;font-weight:800;text-align:center;margin-bottom:6px;padding:3px;border-radius:6px;background:rgba(128,128,128,.12)}
  .pblock{margin-bottom:4px}
  .pblock-gap{margin-top:13px}
  .pblock-center{display:flex;justify-content:center}
  .pblock-center .prow{justify-content:center}
  .prow{display:grid;gap:2px;margin-bottom:2px;justify-content:start}
  :root{--dot:calc(20px * var(--fontscale,1))}
  .pdot-sm{width:var(--dot);height:var(--dot);border-radius:50%;cursor:pointer;border:1px solid rgba(0,0,0,.25);transition:transform .1s}
  .pdot-sm:active{transform:scale(.88)}
  .pdot-sm.pdot-selected{outline:3px solid #1a73e8;outline-offset:2px;transform:scale(1.25);position:relative;z-index:2}
  .pdot-ring-big.pdot-selected{outline:4px solid #1a73e8;outline-offset:3px;transform:scale(1.06)}
  .circle.pdot-selected{outline:3px solid #1a73e8;outline-offset:2px;transform:scale(1.06)}
  .pdot-dim{opacity:.13;filter:saturate(.35)}
  /* Sáng ô phối hợp (trang Tâm ↔ Tâm sở) */
  .pdot-lit{box-shadow:0 0 0 3px #f6a800, 0 0 9px 3px rgba(246,168,0,.6);position:relative;z-index:2}
  .pdot-lit-ani{box-shadow:0 0 0 3px rgba(246,168,0,.4);outline:2px dashed #f6a800;outline-offset:1px;position:relative;z-index:2}
  @media (prefers-color-scheme: dark){
    .pdot-lit{box-shadow:0 0 0 3px #ffc93d, 0 0 10px 3px rgba(255,201,61,.65)}
    .pdot-lit-ani{box-shadow:0 0 0 3px rgba(255,201,61,.45);outline:2px dashed #ffc93d}
  }
  /* Nút tổng quát (trang 22 Quyền) */
  .qbtn-row{display:flex;flex-wrap:wrap;gap:8px;margin:12px 0 4px;justify-content:center}
  .qbtn{padding:7px 12px;border-radius:16px;border:1.5px solid #a86524;background:linear-gradient(180deg,rgba(255,255,255,.95) 0%,rgba(255,255,255,.3) 25%,rgba(255,255,255,0) 55%),linear-gradient(180deg,#fffdf6 0%,#f3e6cb 55%,#e0c99d 100%);color:#4a3608;font-weight:700;font-family:inherit;font-size:12.5px;box-shadow:0 5px 9px rgba(115,62,12,.32),0 2px 0 rgba(255,255,255,.95) inset,0 -4px 6px rgba(165,100,36,.3) inset;transition:transform .08s,box-shadow .08s}
  .qbtn:active{background:linear-gradient(180deg,#f3cba4,#e8b985);transform:translateY(1.5px);box-shadow:0 1px 2px rgba(122,66,14,.22),0 2px 4px rgba(140,85,30,.25) inset}
  /* Chế độ ngôn ngữ: lang-vi = chỉ Việt, lang-pali = chỉ Pāli (mặc định: cả hai) */
  body.lang-vi .circle .cn ~ .cp{display:none}
  body.lang-vi .card .p{display:none}
  body.lang-pali .circle .cn{display:none}
  body.lang-pali .card .v{display:none}
  body.lang-pali .card .p{font-size:12px;font-weight:700;color:var(--ink)}
  #sheet{--fontscale:var(--sheetscale,1)}
  #sheet-fontctrl{position:absolute;top:10px;right:56px;display:flex;gap:4px;z-index:3}
  #sheet-editctrl{position:absolute;top:10px;right:140px;display:flex;gap:4px;z-index:3}
  #sheet-editctrl button,#page-editctrl button{height:30px;min-width:34px;padding:0 8px;border-radius:8px;border:1px solid rgba(128,128,128,.35);background:var(--card);color:var(--ink);font-size:13px;font-weight:700;font-family:inherit}
  #page-editctrl{display:inline-flex;gap:4px;margin-right:6px}
  .save-btn{background:#2e7d32 !important;color:#fff !important;border-color:#2e7d32 !important}
  .cancel-btn{background:#b3392b !important;color:#fff !important;border-color:#b3392b !important}
  .editing-content{outline:2px dashed #c08c22;outline-offset:4px;border-radius:10px;caret-color:#c08c22}
  .edited-dot{position:relative}
  .edited-dot::after{content:"";position:absolute;top:2px;right:2px;width:7px;height:7px;border-radius:50%;background:#c08c22}
  #sheet-fontctrl button{width:34px;height:30px;border-radius:8px;border:1px solid rgba(128,128,128,.35);background:var(--card);color:var(--ink);font-size:13px;font-weight:700;font-family:inherit}
  .setopt{display:flex;gap:8px;flex-wrap:wrap;margin-top:8px}
  .setopt .qbtn.on{background:#b06a28;color:#fff;border-color:#b06a28}
  .dkc{cursor:pointer}
  .dkc.pdot-selected text{fill:#1a73e8}
  .dkc.pdot-selected textPath{fill:#1a73e8}
  .dkc.pdot-selected .dk-shape{stroke:#1a73e8;stroke-width:4.5;filter:drop-shadow(0 0 4px rgba(26,115,232,.8))}
  .pdot-dashed{background:none !important;border:2px dashed #4a9d5f}
  .pdot-ring{background:none !important;border:3px solid #e8c027;width:30px;height:30px}
  .pdot-ring-big{background:radial-gradient(circle, #fff8dc 0%, #fdf0b0 60%, #fdf0b0 100%);border:5px solid #e8c027;width:calc(4 * var(--dot));height:calc(4 * var(--dot));border-radius:50%;cursor:pointer;transition:transform .1s;flex:none}
  .pdot-ring-big:active{transform:scale(.92)}

  .circle-plain{--cl:#fdf9f0;--c:#e2d3ae;--cd:#bcab82;--cdd:#978560;color:var(--ink)}
  .circle-bt{--cl:#f8bcaf;--c:#ef6a4e;--cd:#ac4c38;--cdd:#7c3729;color:#3c0f06}
  .circle-tt{--cl:#f9dfa6;--c:#f2b83a;--cd:#ae842a;--cdd:#7e601e;color:#3a2a03}
  .circle-th{--cl:#bee4ac;--c:#6fc247;--cd:#508c33;--cdd:#3a6525;color:#14300a}
  .circle-sac{--cl:#b0d3f1;--c:#4f9ee0;--cd:#3972a1;--cdd:#295274;color:#0a2740}
  .circle-vt{--cl:#d3bcec;--c:#9e6ad4;--cd:#724c99;--cdd:#52376e;color:#230e45}
  .circle-tho{--cl:#f7cda5;--c:#ee8f38;--cd:#ab6728;--cdd:#7c4a1d;color:#361c03}
  .circle-canh{--cl:#aaddd2;--c:#43b49a;--cd:#30826f;--cdd:#235e50;color:#062b23}
  .circle-dh{--cl:#eacdaa;--c:#d08f42;--cd:#966730;--cdd:#6c4a22;color:#301a03}
  .circle-bt .cp,.circle-tt .cp,.circle-th .cp,.circle-sac .cp,.circle-vt .cp,.circle-tho .cp,.circle-canh .cp,.circle-dh .cp{opacity:.75}
  @media (prefers-color-scheme: dark){
    .circle-bt{--cl:#98756f;--c:#6c3a31;--cd:#4c2922;--cdd:#341c18;color:#ffd9d1}
    .circle-tt{--cl:#958969;--c:#685629;--cd:#493c1d;--cdd:#322914;color:#ffedc2}
    .circle-th{--cl:#79926f;--c:#3f6331;--cd:#2c4522;--cdd:#1e3018;color:#ddf5cc}
    .circle-sac{--cl:#70869d;--c:#335273;--cd:#243950;--cdd:#182737;color:#d8eaff}
    .circle-vt{--cl:#827698;--c:#4d3b6c;--cd:#36294c;--cdd:#251c34;color:#ecdfff}
    .circle-tho{--cl:#988169;--c:#6c4b29;--cd:#4c341d;--cdd:#342414;color:#ffe2c4}
    .circle-canh{--cl:#6b9088;--c:#2b6055;--cd:#1e433c;--cdd:#152e29;color:#d2f5ec}

<div id="app">
  <header>

    <div id="section-switch"></div>
    <div id="toolbar">
      <div id="page-actions"></div>
      <div id="fontctrl">

          <button id="page-restore-btn" onclick="restoreEdit('page')" style="display:none" title="Khôi phục nội dung gốc">↺</button>
          <button id="page-save-btn" class="save-btn" onclick="saveEdit()" style="display:none">✔ Lưu</button>

    </div>

    <div class="legend" id="legend"></div>
    <div id="extra-content"></div>
  </main>
  <nav id="nav"></nav>
</div>

<div id="sheet-backdrop" onclick="closeSheet()"></div>
<div id="sheet" role="dialog" aria-modal="true">
  <div id="sheet-editctrl">
    <button id="sheet-edit-btn" onclick="startEdit('sheet')" aria-label="Sửa nội dung" title="Sửa nội dung bảng này">✎</button>
    <button id="sheet-restore-btn" onclick="restoreEdit('sheet')" style="display:none" title="Khôi phục nội dung gốc">↺</button>
    <button id="sheet-save-btn" class="save-btn" onclick="saveEdit()" style="display:none">✔ Lưu</button>
    <button id="sheet-cancel-btn" class="cancel-btn" onclick="cancelEdit()" style="display:none">✕ Hủy</button>
  </div>
  <div id="sheet-fontctrl">
    <button onclick="openZoomFloat(-0.05)" aria-label="Thu nhỏ các ô và chữ của trang">A−</button>
    <button onclick="openZoomFloat(0.05)" aria-label="Phóng to các ô và chữ của trang">A+</button>
  </div>
  <button class="close-x" onclick="closeSheet()" aria-label="Đóng">✕</button>
  <div class="sheet-handle"></div>
  <div id="sheet-content"></div>
</div>
